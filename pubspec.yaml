name: zonix_glasses
description: "Zonix Glasses — companion app Flutter"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  logger: ^2.4.0
  http: ^1.2.2
  google_sign_in: ^6.2.1
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  http_parser: ^4.0.2
  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.13.1
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  intl: ^0.19.0
  flutter_dotenv: ^5.2.1
  permission_handler: ^11.3.1
  flutter_svg: ^2.0.10+1
  json_annotation: ^4.9.0
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  shimmer: ^2.0.0
  pusher_channels_flutter: ^2.2.1
  share_plus: ^12.0.1
  smooth_page_indicator: ^1.2.0+3
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1
  flutter_native_splash: any
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mockito: ^5.4.2
  flutter_lints: ^4.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.8.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_login.png"
  image_path_android: "assets/images/logo_login.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/splash_logo_dark.png"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/onboarding/welcome_image.svg
    - assets/onboarding/undraw_add_information_j2wg.svg
    - assets/onboarding/undraw_outer_space_re_u9vd.svg
    - assets/images/logo_login.png
    - assets/images/logo_login2.png
    - assets/images/splash_logo.png
    - assets/images/splash_logo_dark.png
    - assets/default_avatar.png
    - .env
    - assets/fonts/Roboto-Regular.ttf
