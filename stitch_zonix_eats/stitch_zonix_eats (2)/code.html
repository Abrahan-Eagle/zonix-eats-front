<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center">
<!-- Screen Backdrop Simulator -->
<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-10 flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="relative w-full max-w-sm bg-background-light dark:bg-background-dark rounded-2xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Close Button -->
<button class="absolute top-4 right-4 z-20 p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined block text-[24px]">close</span>
</button>
<!-- Modal Content -->
<div class="flex flex-col items-center p-8">
<!-- Header -->
<div class="w-full mb-6">
<h2 class="text-xl font-bold text-slate-900 dark:text-slate-100 text-center">Mi Perfil</h2>
<p class="text-sm text-slate-500 dark:text-slate-400 text-center mt-1">@usuario_zonix</p>
</div>
<!-- Profile Picture Container -->
<div class="relative group mb-8">
<div class="w-48 h-48 rounded-full overflow-hidden border-4 border-primary/20 dark:border-primary/40 shadow-xl">
<img alt="Foto de perfil del usuario" class="w-full h-full object-cover" data-alt="Modern high-resolution male profile portrait photography" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDEZx3cEMpBFftugmsY6c67SteOd1P0uzm8HFkVYF5oVbVmA7dn5e9pW5QKDRr-U2gGauR5GJkBhkLIMZxZNkVcfVRjJb6WQD2le_m3nsHIHh3_KK19pSdKzaFE_VNlrzSq3kTNS0UCJuaJky8z3rtjweuDC18g5AV09bXSS9DSjC7Byv7WdtPGuV_Lbj4qF6L2p2XgHvRAb4lfZIe3uWwdfJelc23Lov7_nyiUwyrwOQDJoSj2SlgEwNjuKJBnAWna6A3mnxtJXG0"/>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full space-y-3">
<button class="w-full flex items-center justify-center gap-2 bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]">
<span class="material-symbols-outlined">photo_camera</span>
<span>Tomar nueva foto</span>
</button>
<button class="w-full flex items-center justify-center gap-2 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-900 dark:text-slate-100 font-semibold py-4 rounded-xl transition-all">
<span class="material-symbols-outlined">image</span>
<span>Elegir de la galería</span>
</button>
</div>
<!-- Footer Info -->
<div class="mt-6 flex items-center gap-2 text-slate-400 dark:text-slate-500 text-xs">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span>Tu foto es visible para repartidores y comercios</span>
</div>
</div>
<!-- Bottom Handle Indicator (Aesthetic only) -->
<div class="w-full flex justify-center pb-2">
<div class="h-1.5 w-12 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</div>
</div>
</div>
<!-- Background Content Simulator (Blurred Content) -->
<div class="w-full max-w-md p-6 space-y-6 opacity-30 select-none pointer-events-none">
<div class="h-10 w-32 bg-slate-300 dark:bg-slate-700 rounded"></div>
<div class="h-64 w-full bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
<div class="space-y-3">
<div class="h-4 w-full bg-slate-200 dark:bg-slate-800 rounded"></div>
<div class="h-4 w-3/4 bg-slate-200 dark:bg-slate-800 rounded"></div>
</div>
</div>
</body></html>
