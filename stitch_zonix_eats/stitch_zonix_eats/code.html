<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3299FF",
                        "background-light": "#f8f6f6",
                        "background-dark": "#000000",
                        "surface": "#151D29",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Zonix Eats - Perfil Más</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen pb-24">
<!-- Header / App Bar -->
<header class="sticky top-0 z-50 bg-background-light dark:bg-background-dark px-4 py-4 flex items-center justify-between border-b border-slate-200 dark:border-slate-800">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-100 dark:hover:bg-surface">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold">Mi Perfil</h1>
<button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-100 dark:hover:bg-surface">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<!-- Tabs Section -->
<div class="px-4 py-4 flex gap-3">
<button class="px-6 py-2 rounded-full text-sm font-semibold bg-slate-200 dark:bg-surface text-slate-600 dark:text-slate-400">
            Persona
        </button>
<button class="px-6 py-2 rounded-full text-sm font-semibold bg-primary text-white">
            Más
        </button>
</div>
<!-- Main Content Area -->
<main class="px-4 space-y-6">
<!-- CARD 1: Actividad y Datos -->
<section>
<h2 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3 px-1">Actividad y Datos</h2>
<div class="bg-white dark:bg-surface rounded-xl overflow-hidden shadow-sm">
<!-- Item -->
<button class="w-full flex items-center gap-4 p-4 border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
<div class="size-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">history</span>
</div>
<span class="flex-1 text-left font-medium">Historial de actividad</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<!-- Item -->
<button class="w-full flex items-center gap-4 p-4 border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
<div class="size-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">download</span>
</div>
<span class="flex-1 text-left font-medium">Exportar datos</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<!-- Item -->
<button class="w-full flex items-center gap-4 p-4 hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
<div class="size-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">shield</span>
</div>
<span class="flex-1 text-left font-medium">Privacidad</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
</div>
</section>
<!-- CARD 2: Comercio -->
<section>
<h2 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3 px-1">Gestión de Comercio</h2>
<div class="bg-white dark:bg-surface rounded-xl overflow-hidden shadow-sm">
<button class="w-full flex items-center gap-4 p-4 border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30">
<div class="size-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">storefront</span>
</div>
<span class="flex-1 text-left font-medium">Datos del comercio</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<button class="w-full flex items-center gap-4 p-4 border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30">
<div class="size-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">payments</span>
</div>
<span class="flex-1 text-left font-medium">Métodos de pago</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<button class="w-full flex items-center gap-4 p-4 border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30">
<div class="size-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">schedule</span>
</div>
<span class="flex-1 text-left font-medium">Horario de atención</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<button class="w-full flex items-center gap-4 p-4 border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30">
<div class="size-10 rounded-lg bg-emerald-500/20 flex items-center justify-center text-emerald-500">
<span class="material-symbols-outlined">door_open</span>
</div>
<div class="flex-1 text-left">
<p class="font-medium">Estado del comercio</p>
<p class="text-xs text-emerald-500 font-bold">Abierto actualmente</p>
</div>
<span class="material-symbols-outlined text-slate-400">toggle_on</span>
</button>
<button class="w-full flex items-center gap-4 p-4 border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30">
<div class="size-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">campaign</span>
</div>
<span class="flex-1 text-left font-medium">Promociones</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<button class="w-full flex items-center gap-4 p-4 hover:bg-slate-50 dark:hover:bg-slate-800/30">
<div class="size-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">map</span>
</div>
<span class="flex-1 text-left font-medium">Zonas de delivery</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
</div>
</section>
<!-- CARD 3: Soporte y App -->
<section>
<h2 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3 px-1">Soporte y Aplicación</h2>
<div class="bg-white dark:bg-surface rounded-xl overflow-hidden shadow-sm">
<button class="w-full flex items-center gap-4 p-4 border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30">
<div class="size-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">notifications_active</span>
</div>
<span class="flex-1 text-left font-medium">Notificaciones</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<button class="w-full flex items-center gap-4 p-4 border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30">
<div class="size-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">help</span>
</div>
<span class="flex-1 text-left font-medium">Ayuda y comentarios</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<button class="w-full flex items-center gap-4 p-4 hover:bg-slate-50 dark:hover:bg-slate-800/30">
<div class="size-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">info</span>
</div>
<span class="flex-1 text-left font-medium">Acerca de Zonix Eats</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
</div>
</section>
<!-- Footer Actions -->
<div class="pt-4 pb-8 flex flex-col items-center gap-4">
<button class="w-full py-4 bg-primary rounded-xl font-bold text-white shadow-lg shadow-primary/20">
                Cerrar sesión
            </button>
<button class="text-sm font-medium text-red-500 hover:text-red-600 transition-colors">
                Eliminar cuenta permanentemente
            </button>
<p class="text-xs text-slate-500 mt-2 italic">Versión 2.4.12 - Zonix Eats App</p>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-surface border-t border-slate-200 dark:border-slate-800 px-4 pb-6 pt-2 z-50">
<div class="flex items-center justify-between max-w-md mx-auto">
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Inicio</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">search</span>
<span class="text-[10px] font-medium">Explorar</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">receipt_long</span>
<span class="text-[10px] font-medium">Pedidos</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-current" style="font-variation-settings: 'FILL' 1">person</span>
<span class="text-[10px] font-medium">Perfil</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">more_horiz</span>
<span class="text-[10px] font-medium">Más</span>
</a>
</div>
</nav>
</body></html>
